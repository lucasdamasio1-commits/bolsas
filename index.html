function esc(s){
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render(lista){
  var tb = document.getElementById('tbody');
  document.getElementById('cnt').textContent = lista.length;
  if(!lista.length){
    tb.innerHTML='<tr><td colspan="8" class="vazio">Nenhuma bolsa encontrada para os filtros selecionados.</td></tr>';
    return;
  }
  tb.innerHTML = lista.map(function(b,i){
    var cls = b.ativo==='Sim' ? 'ativo-row' : (i%2===0 ? 'par' : '');
    var ab  = b.ativo==='Sim'
      ? '<span class="badge b-sim">&#10004; Ativo</span>'
      : '<span class="badge b-nao">—</span>';
    return '<tr class="'+cls+'">'
      +'<td>'+esc(b.titulo)+'</td>'
      +'<td>'+esc(b.fonte)+'</td>'
      +'<td>'+esc(b.pais)+'</td>'
      +'<td>'+esc(b.nivel)+'</td>'
      +'<td>'+esc(b.prazo)+'</td>'
      +'<td><span class="badge b-sc">'+b.score+'</span></td>'
      +'<td>'+ab+'</td>'
      +'<td><a href="'+esc(b.link)+'" target="_blank" rel="noopener">Abrir &rarr;</a></td>'
      +'</tr>';
  }).join('');
}

function filtrar(){
  var busca = document.getElementById('busca').value.toLowerCase();
  var fonte = document.getElementById('f-fonte').value;
  var pais  = document.getElementById('f-pais').value;
  var nivel = document.getElementById('f-nivel').value;
  var ativo = document.getElementById('f-ativo').value;
  var r = DADOS.filter(function(b){
    if(busca && b.titulo.toLowerCase().indexOf(busca)<0) return false;
    if(fonte && b.fonte!==fonte) return false;
    if(pais  && b.pais!==pais)  return false;
    if(nivel && b.nivel!==nivel) return false;
    if(ativo && b.ativo!==ativo) return false;
    return true;
  });
  render(r);
}

['busca','f-fonte','f-pais','f-nivel','f-ativo'].forEach(function(id){
  document.getElementById(id).addEventListener('input', filtrar);
  document.getElementById(id).addEventListener('change', filtrar);
});

render(DADOS);
</script>
