<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Radar de Bolsas — Administração · Marketing · IA · Inovação</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f2f8;padding:16px;color:#1a1a2e}
header{background:#1F3864;color:#fff;border-radius:10px;padding:16px 22px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
header h1{font-size:18px;font-weight:700}
header p{font-size:12px;opacity:.75}
.filtros{background:#fff;border:0.5px solid #d5daea;border-radius:10px;padding:14px 18px;margin-bottom:12px;display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:11px;color:#666;font-weight:500}
.fg input,.fg select{padding:6px 9px;border:1px solid #cdd5e0;border-radius:6px;font-size:12px;color:#222;background:#fff;min-width:140px}
.fg input{min-width:200px}
.resumo{font-size:12px;color:#555;margin-bottom:8px}
.resumo strong{color:#1F3864;font-weight:700}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;font-size:12px;box-shadow:0 1px 6px rgba(0,0,0,.07)}
th{background:#1F3864;color:#fff;padding:9px 11px;text-align:left;white-space:nowrap;font-size:11px;letter-spacing:.02em}
td{padding:7px 11px;border-bottom:1px solid #eef0f7;vertical-align:top;line-height:1.4}
td:first-child{max-width:420px;word-break:break-word;font-weight:500}
tr.par td{background:#f7f9ff}
tr:hover td{background:#edf1fb!important}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;white-space:nowrap}
.b-br{background:#e8f5e9;color:#1b5e20}
.b-eu{background:#e3f2fd;color:#0d47a1}
.b-us{background:#fce4ec;color:#880e4f}
.b-pt{background:#fff3e0;color:#e65100}
.b-gl{background:#f3e5f5;color:#4a148c}
.b-nivel{background:#e8edf8;color:#1F3864;margin-left:3px}
a{color:#1F3864;text-decoration:none;font-weight:600}
a:hover{text-decoration:underline}
.vazio{text-align:center;padding:48px;color:#999;font-size:13px}
.prazo-vazio{color:#bbb;font-style:italic}
@media(max-width:700px){th:nth-child(3),td:nth-child(3),th:nth-child(4),td:nth-child(4){display:none}}
</style>
</head>
<body>

<header>
  <div>
    <h1>Radar de Bolsas de Pesquisa</h1>
    <p>Administração · Marketing · IA · Empreendedorismo · Economia</p>
  </div>
  <p>Atualizado em 02/05/2026</p>
</header>

<div class="filtros">
  <div class="fg"><label>Buscar no título</label>
    <input id="busca" type="text" placeholder="Ex: marketing, phd, innovation..."></div>
  <div class="fg"><label>Fonte</label>
    <select id="f-fonte"><option value="">Todas</option><option value="CAPES (Bertha)">CAPES (Bertha)</option></select></div>
  <div class="fg"><label>País / Região</label>
    <select id="f-pais"><option value="">Todos</option><option value="Brasil">Brasil</option></select></div>
  <div class="fg"><label>Área</label>
    <select id="f-area"><option value="">Todas</option><option value="Bolsa">Bolsa</option><option value="Projeto">Projeto</option></select></div>
  <div class="fg"><label>Nível</label>
    <select id="f-nivel"><option value="">Todos</option><option value="Doutorado">Doutorado</option><option value="Geral / Multiplos">Geral / Multiplos</option></select></div>
</div>

<p class="resumo">Mostrando <strong id="cnt">0</strong> de <strong>10</strong> bolsas</p>

<table>
  <thead><tr>
    <th>Título do Edital</th>
    <th>Fonte</th>
    <th>País</th>
    <th>Área</th>
    <th>Nível</th>
    <th>Prazo</th>
    <th>Link</th>
  </tr></thead>
  <tbody id="tbody"></tbody>
</table>

<script>
var D=[{"titulo": "BRAFITEC - BRASIL FRANÇA ENGENHARIA TECNOLOGIA - BRAFITEC – Edital nº 09/2026", "fonte": "CAPES (Bertha)", "pais": "Brasil", "area": "Projeto", "nivel": "Geral / Multiplos", "prazo": "08/07/2026", "link": "https://www.gov.br/capes/pt-br/acesso-a-informacao/acoes-e-programas/bolsas/bolsas-e-auxilios-internacionais/encontre-aqui/paises/franca/programa-capes-brafitec", "data": "2026-05-02"}, {"titulo": "CAPES/COFECUB (COMITÊ FRANCÊS DE AVALIAÇÃO DA COOPERAÇÃO UNIVERSITÁRIA COM O BRASIL) - COFECUB - Edital nº 07/2026 - Pesquisador Experiente", "fonte": "CAPES (Bertha)", "pais": "Brasil", "area": "Projeto", "nivel": "Doutorado", "prazo": "29/05/2026", "link": "https://www.gov.br/capes/pt-br/acesso-a-informacao/acoes-e-programas/bolsas/bolsas-e-auxilios-internacionais/encontre-aqui/paises/franca/cofecub", "data": "2026-05-02"}, {"titulo": "PROGRAMA CÁTEDRA - Cátedra Jorge Amado 11/2026", "fonte": "CAPES (Bertha)", "pais": "Brasil", "area": "Projeto", "nivel": "Doutorado", "prazo": "30/12/2026", "link": "https://inscricao.capes.gov.br/edital/CTDJORGE2026", "data": "2026-05-02"}, {"titulo": "PROGRAMA CÁTEDRA - Cátedra Rio Branco - King's College London - Edital nº 21/2024 - 3ª Chamada", "fonte": "CAPES (Bertha)", "pais": "Brasil", "area": "Projeto", "nivel": "Doutorado", "prazo": "29/05/2026", "link": "https://www.gov.br/capes/pt-br/acesso-a-informacao/acoes-e-programas/bolsas/bolsas-e-auxilios-internacionais/encontre-aqui/paises/reino-unido/catedra-rio-branco-kings-college", "data": "2026-05-02"}, {"titulo": "PROGRAMA CÁTEDRA - Cátedra Tubingen 2024 – Edital 20/2024 - 2ª Chamada", "fonte": "CAPES (Bertha)", "pais": "Brasil", "area": "Projeto", "nivel": "Doutorado", "prazo": "30/06/2026", "link": "https://www.gov.br/capes/pt-br/acesso-a-informacao/acoes-e-programas/bolsas/bolsas-e-auxilios-internacionais/encontre-aqui/paises/reino-unido/programa-catedra-tubingen", "data": "2026-05-02"}, {"titulo": "PROGRAMA BOLSAS PARA PESQUISA - CAPES/HUMBOLDT - HUMBOLDT - Edital nº 14/2022 - 26ª Chamada – Pesquisador Experiente", "fonte": "CAPES (Bertha)", "pais": "Brasil", "area": "Bolsa", "nivel": "Geral / Multiplos", "prazo": "29/05/2026", "link": "https://www.gov.br/capes/pt-br/acesso-a-informacao/acoes-e-programas/bolsas/bolsas-e-auxilios-internacionais/encontre-aqui/paises/alemanha/programa-bolsas-para-pesquisa-capeshumboldt", "data": "2026-05-02"}, {"titulo": "MES CUBA DOCENTE - CAPES/MES CUBA - MESCUBA  DOCENTES 13/2026", "fonte": "CAPES (Bertha)", "pais": "Brasil", "area": "Bolsa", "nivel": "Doutorado", "prazo": "12/06/2026", "link": "https://inscricao.capes.gov.br/edital/MESCUBADOC2025", "data": "2026-05-02"}, {"titulo": "PROBRAL - PROJETOS DE COOPERAÇÃO EM PESQUISA ENTRE O BRASIL E A ALEMANHA - CAPES/DAAD - PROBRAL - Edital nº 08/2026", "fonte": "CAPES (Bertha)", "pais": "Brasil", "area": "Projeto", "nivel": "Doutorado", "prazo": "28/05/2026", "link": "https://www.gov.br/capes/pt-br/acesso-a-informacao/acoes-e-programas/bolsas/bolsas-e-auxilios-internacionais/encontre-aqui/paises/alemanha/probral", "data": "2026-05-02"}, {"titulo": "PROGRAMAS CAPES/MATH/STIC/CLIMAT-AMSUD - PROGRAMAS CAPES/MATH/STIC/CLIMAT-AMSUD EDITAL n° 10/2026", "fonte": "CAPES (Bertha)", "pais": "Brasil", "area": "Projeto", "nivel": "Doutorado", "prazo": "10/06/2026", "link": "https://www.gov.br/capes/pt-br/acesso-a-informacao/acoes-e-programas/bolsas/bolsas-e-auxilios-internacionais/encontre-aqui/paises/multinacional/programa-stic-amsud-capes", "data": "2026-05-02"}, {"titulo": "DOUTORADO PLENO EM PURDUE - CAPES/PURDUE UNIVERSITY - Purdue 05/2026", "fonte": "CAPES (Bertha)", "pais": "Brasil", "area": "Projeto", "nivel": "Doutorado", "prazo": "10/06/2026", "link": "https://www.gov.br/capes/pt-br/acesso-a-informacao/acoes-e-programas/bolsas/bolsas-e-auxilios-internacionais/encontre-aqui/paises/estados-unidos/programa-capes-purdue-para-projetos-conjuntos-de-pesquisa", "data": "2026-05-02"}];
var PAIS_COR={"Brasil":"b-br","Europa":"b-eu","EUA":"b-us","Reino Unido":"b-eu",
  "Portugal":"b-pt","Alemanha":"b-eu","Internacional":"b-gl"};

function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function cor(pais){
  for(var k in PAIS_COR){ if(pais.indexOf(k)>=0) return PAIS_COR[k]; }
  return 'b-gl';
}

function render(lista){
  var tb=document.getElementById('tbody');
  document.getElementById('cnt').textContent=lista.length;
  if(!lista.length){
    tb.innerHTML='<tr><td colspan="7" class="vazio">Nenhuma bolsa para os filtros selecionados.</td></tr>';
    return;
  }
  tb.innerHTML=lista.map(function(b,i){
    var pc=cor(b.pais);
    var pr=b.prazo?esc(b.prazo):'<span class="prazo-vazio">—</span>';
    var lk=b.link?'<a href="'+esc(b.link)+'" target="_blank" rel="noopener">Abrir &rarr;</a>':'—';
    return '<tr class="'+(i%2?'':'par')+'">'
      +'<td>'+esc(b.titulo)+'</td>'
      +'<td><span class="badge '+pc+'">'+esc(b.fonte)+'</span></td>'
      +'<td>'+esc(b.pais)+'</td>'
      +'<td>'+esc(b.area)+'</td>'
      +'<td><span class="badge b-nivel">'+esc(b.nivel)+'</span></td>'
      +'<td>'+pr+'</td>'
      +'<td>'+lk+'</td>'
      +'</tr>';
  }).join('');
}

function filtrar(){
  var busca=document.getElementById('busca').value.toLowerCase();
  var fonte=document.getElementById('f-fonte').value;
  var pais =document.getElementById('f-pais').value;
  var area =document.getElementById('f-area').value;
  var nivel=document.getElementById('f-nivel').value;
  render(D.filter(function(b){
    if(busca && b.titulo.toLowerCase().indexOf(busca)<0) return false;
    if(fonte && b.fonte!==fonte) return false;
    if(pais  && b.pais!==pais)  return false;
    if(area  && b.area!==area)  return false;
    if(nivel && b.nivel!==nivel) return false;
    return true;
  }));
}

['busca','f-fonte','f-pais','f-area','f-nivel'].forEach(function(id){
  var el=document.getElementById(id);
  el.addEventListener('input',filtrar);
  el.addEventListener('change',filtrar);
});

render(D);
</script>
</body>
</html>
